server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/visaoassistiva
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  websocket:
    allowed-origins: "*"

app:
  ia:
    base-url: http://ia-service:8000
    timeout-connect-ms: 2000
    timeout-read-ms: 5000
  rate-limit:
    fps: 5
  persistencia:
    habilitada: true
  filtro:
    classes-relevantes:
      - person
      - chair
      - table
      - door
      - stairs
      - car

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.visaoassistiva: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"