name: Create Kanban Project

on:
  workflow_dispatch:

jobs:
  create-kanban:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      repository-projects: write

    steps:
      - name: Create GitHub Project Kanban Board
        env:
          # Use GH_PAT (Personal Access Token with 'project' scope) if available,
          # otherwise fall back to GITHUB_TOKEN.
          # For user-level projects, a PAT with the 'project' scope is required.
          # For organization-level projects, GITHUB_TOKEN with repository-projects: write
          # permission may be sufficient. Add a repository secret named GH_PAT with a
          # PAT that has 'project' scope to support user-level project creation.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Get the repository owner node ID
          OWNER_ID=$(gh api graphql -f query='
            query($owner: String!, $repo: String!) {
              repository(owner: $owner, name: $repo) {
                owner {
                  id
                }
              }
            }
          ' -f owner="${{ github.repository_owner }}" \
            -f repo="${{ github.event.repository.name }}" \
            --jq '.data.repository.owner.id')

          echo "Owner ID: $OWNER_ID"

          # Create the project
          PROJECT_DATA=$(gh api graphql -f query='
            mutation($ownerId: ID!, $title: String!) {
              createProjectV2(input: {ownerId: $ownerId, title: $title}) {
                projectV2 {
                  id
                  number
                  url
                }
              }
            }
          ' -f ownerId="$OWNER_ID" -f title="Kanban - Sensus")

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.id')
          PROJECT_NUMBER=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.number')
          PROJECT_URL=$(echo "$PROJECT_DATA" | jq -r '.data.createProjectV2.projectV2.url')

          echo "Project ID: $PROJECT_ID"
          echo "Project Number: $PROJECT_NUMBER"
          echo "Project URL: $PROJECT_URL"

          # Display the Status field options (these become the Kanban columns)
          FIELD_DATA=$(gh api graphql -f query='
            query($projectId: ID!) {
              node(id: $projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }
          ' -f projectId="$PROJECT_ID")

          STATUS_FIELD_ID=$(echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .id')
          echo "Status Field ID: $STATUS_FIELD_ID"

          echo "Kanban columns (Status field options):"
          echo "$FIELD_DATA" | jq -r '.data.node.fields.nodes[] | select(.name == "Status") | .options[] | .name'

          echo "✅ Kanban board created successfully!"
          echo "🔗 Project URL: $PROJECT_URL"
